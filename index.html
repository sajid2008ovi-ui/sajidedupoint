<title>Sajid EduPoint</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
color:#333;
overflow-x:hidden;
}

header{
background:#0d6efd;
padding:18px;
text-align:center;
color:#fff;
position:relative;
}

header h2{
font-size:34px;
}

nav{
display:none;
}

/* Big Menu Button */

.menu-btn{
position:fixed;
top:18px;
right:18px;
width:68px;
height:68px;
background:#fff;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
cursor:pointer;
box-shadow:0 8px 25px rgba(0,0,0,.25);
z-index:9999;
transition:.3s;
}

.menu-btn:hover{
transform:scale(1.08);
}

/* Sidebar */

.sidebar{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#fff;
padding:30px 25px;
transition:.35s;
box-shadow:-8px 0 30px rgba(0,0,0,.25);
border-radius:25px 0 0 25px;
z-index:9998;
overflow:auto;
}

.sidebar.active{
right:0;
}

.close-btn{
font-size:36px;
text-align:right;
cursor:pointer;
margin-bottom:20px;
}

.sidebar a{
display:block;
padding:16px;
margin:10px 0;
background:#f5f5f5;
border-radius:14px;
text-decoration:none;
font-size:20px;
font-weight:bold;
color:#222;
transition:.25s;
}

.sidebar a:hover{
background:#0d6efd;
color:#fff;
}
</head>
